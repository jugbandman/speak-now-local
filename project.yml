name: SpeakNowLocal
options:
  bundleIdPrefix: com.andycarlson
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

targets:
  SpeakNowLocal:
    type: application
    platform: macOS
    sources:
      - path: SpeakNowLocal
        excludes:
          - "Resources/*"
          - "Info.plist"
    settings:
      base:
        INFOPLIST_FILE: SpeakNowLocal/Info.plist
        CODE_SIGN_ENTITLEMENTS: SpeakNowLocal/Resources/SpeakNowLocal.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.andycarlson.SpeakNowLocal
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_IDENTITY: "-"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: KeyboardShortcuts

  SpeakNowLocalTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: SpeakNowLocalTests
    dependencies:
      - target: SpeakNowLocal
    settings:
      base:
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.0.0"
